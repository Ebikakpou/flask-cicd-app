name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test:
  runs-on: ubuntu-lastest

    steps:
      -name: Checkout code
      -uses: actions/checkout@v3

      -name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

      -name Install dependencies
      run: |
        pytest app/

docker-build-push:
  needs: build-test
  runs-on: ubuntu-lastest 

    steps:
      -uses: actions/checkout@v3

      -name: Login to DockerHub
      uses: docker/login-action@v2
      with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

      -name: Build & Push Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-cicd:lastest .
        docker push ${{ secrets.DOCKER_USERNAME }}/flask-cicd:lastest


deploy:
  needs: docker-build-push
  runs-on: ubuntu-lastest

  steps:
    -name: SSH into EC2 & Deploy
    uses: appleboy/ssh-action@v0.1.6
    with:
    host: ${{ secrets.EC2_HOST 
    username: ${{secrets.EC2_USER }}
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      docker pull ${{secrets.DOCKER_USERNAME }}/flask-cicd:lastest
      docker stop flask-app || true
      docker rm flask-app || true
      docker run -d -p 80:5000 --name flask-ap \
          ${{ secrets.DOCKER_USERNAME }}/flask-cicd:lastest

      

 
